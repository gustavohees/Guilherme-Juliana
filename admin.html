
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel dos Noivos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Painel dos Noivos 💍</h1>
    <div id="loginArea">
      <p>Digite a senha para acessar as mensagens:</p>
      <input type="password" id="senha" placeholder="Senha de acesso" />
      <button onclick="verificarSenha()">Entrar</button>
      <p id="loginErro" style="color:red; display:none;">Senha incorreta.</p>
    </div>

    <div id="adminArea" style="display:none;">
      <button onclick="baixarTudo()">⬇️ Baixar tudo</button>
      <div id="mensagens"></div>
    </div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module">
    import { db } from './firebase.js';
    import { collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const senhaCorreta = 'noivos2025';

    window.verificarSenha = function () {
      const senha = document.getElementById('senha').value;
      if (senha === senhaCorreta) {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('adminArea').style.display = 'block';
        carregarMensagens();
      } else {
        document.getElementById('loginErro').style.display = 'block';
      }
    }

    async function carregarMensagens() {
      const mensagensDiv = document.getElementById('mensagens');
      const snap = await getDocs(collection(db, 'mensagens'));
      mensagensDiv.innerHTML = '';

      snap.forEach(doc => {
        const msg = doc.data();
        const container = document.createElement('div');
        container.style.border = "1px solid #ccc";
        container.style.padding = "1rem";
        container.style.margin = "1rem 0";
        container.style.borderRadius = "10px";
        container.innerHTML = `
          <h3>${msg.nome}</h3>
          <p>${msg.mensagem}</p>
          ${msg.arquivos && msg.arquivos.length ? '<h4>Arquivos:</h4>' : ''}
          <ul>
            ${(msg.arquivos || []).map(arquivo => `
              <li>
                <a href="${arquivo.url}" target="_blank">${arquivo.name}</a>
              </li>
            `).join('')}
          </ul>
        `;
        mensagensDiv.appendChild(container);
      });
    }

    window.baixarTudo = async function () {
      const zip = new JSZip();
      const snap = await getDocs(collection(db, 'mensagens'));

      for (const doc of snap.docs) {
        const dados = doc.data();
        for (const arquivo of dados.arquivos || []) {
          const response = await fetch(arquivo.url);
          const blob = await response.blob();
          zip.file(`${dados.nome}-${arquivo.name}`, blob);
        }
      }

      const conteudo = await zip.generateAsync({ type: 'blob' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(conteudo);
      link.download = "mensagens-casamento.zip";
      link.click();
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</body>
</html>
