
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Juliana & Guilherme - 06.07.25</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="J | G 06.07.25" />
    </div>

    <h1>Deixe sua mensagem com amor</h1>
    <p>Guilherme & Juliana agradecem todo carinho enviado por você ❤️</p>

    <form id="messageForm">
      <input type="text" id="nome" placeholder="Seu nome" required />
      <textarea id="mensagem" placeholder="Sua mensagem" required></textarea>
      <input type="file" id="fileInput" multiple accept="image/*,video/*" />
      <button type="submit">Enviar para os noivos</button>
    </form>

    <div id="status" class="status"></div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
